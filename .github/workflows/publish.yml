name: Publish to NuGet

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Detect version change
        id: version
        shell: pwsh
        run: |
          $projectPath = 'src/Sorvia.Aspire.Hosting.Dokploy/Sorvia.Aspire.Hosting.Dokploy.csproj'
          $projectContent = Get-Content $projectPath -Raw
          $project = New-Object System.Xml.XmlDocument
          $project.LoadXml($projectContent)
          $currentVersion = @($project.Project.PropertyGroup.Version)[0]
          if ([string]::IsNullOrWhiteSpace($currentVersion)) {
            throw "Package version is missing in the project file."
          }

          "current_version=$currentVersion" >> $env:GITHUB_OUTPUT

          $previousCommit = git rev-parse 'HEAD^1' 2>$null
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($previousCommit)) {
            "previous_version=" >> $env:GITHUB_OUTPUT
            "version_changed=true" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $previousCommit = $previousCommit.Trim()
          $previousProjectContent = (git show "${previousCommit}:$projectPath" 2>$null | Out-String)
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($previousProjectContent)) {
            "previous_version=" >> $env:GITHUB_OUTPUT
            "version_changed=true" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $previousProjectContent = $previousProjectContent.TrimStart([char]0xFEFF).Trim()
          $previousProject = New-Object System.Xml.XmlDocument
          $previousProject.LoadXml($previousProjectContent)
          $previousVersion = @($previousProject.Project.PropertyGroup.Version)[0]
          "previous_version=$previousVersion" >> $env:GITHUB_OUTPUT
          "version_changed=$([string]($previousVersion -ne $currentVersion).ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Stop when package version did not change
        if: steps.version.outputs.version_changed != 'true'
        shell: pwsh
        env:
          CURRENT_VERSION: ${{ steps.version.outputs.current_version }}
        run: |
          Write-Host "Package version unchanged ($env:CURRENT_VERSION). Skipping NuGet publish."

      - name: Download package artifact from CI
        if: steps.version.outputs.version_changed == 'true'
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          name: Sorvia.Aspire.Hosting.Dokploy-package
          path: ./artifacts

      - name: NuGet login (OIDC)
        if: steps.version.outputs.version_changed == 'true'
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        if: steps.version.outputs.version_changed == 'true'
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
