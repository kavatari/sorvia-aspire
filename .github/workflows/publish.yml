name: Publish to NuGet

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Detect version change
        id: version
        run: dotnet run --file .github/scripts/detect-version-change.cs -- src/Sorvia.Aspire.Hosting.Dokploy/Sorvia.Aspire.Hosting.Dokploy.csproj

      - name: Stop when package version did not change
        if: steps.version.outputs.version_changed != 'true'
        shell: pwsh
        env:
          CURRENT_VERSION: ${{ steps.version.outputs.current_version }}
        run: |
          Write-Host "Package version unchanged ($env:CURRENT_VERSION). Skipping NuGet publish."

      - name: Download package artifact from CI
        if: steps.version.outputs.version_changed == 'true'
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          name: Sorvia.Aspire.Hosting.Dokploy-package
          path: ./artifacts

      - name: NuGet login (OIDC)
        if: steps.version.outputs.version_changed == 'true'
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        if: steps.version.outputs.version_changed == 'true'
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
